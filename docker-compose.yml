services:
  db:
    image: postgres:15-alpine
    container_name: shms_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-shms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: ../devops/docker/backend/Dockerfile
    container_name: shms_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-shms}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: shms_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
      AIRFLOW_UID: 50000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shms}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ETL_RAW_DIR: /opt/airflow/etl/data/raw
      ETL_PROCESSED_DIR: /opt/airflow/etl/data/processed
      ETL_STATE_FILE: /opt/airflow/etl/state/etl_state.json
      ETL_SCHEMA_FILE: /opt/airflow/etl/schema.sql
    entrypoint: /bin/bash
    command:
      - -c
      - |
        export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=$$(python3 - <<'PY'
        import os
        from urllib.parse import quote
        user = quote(os.getenv('DB_USER', 'postgres'), safe='')
        password = quote(os.getenv('DB_PASSWORD', ''), safe='')
        host = os.getenv('DB_HOST', 'db')
        port = os.getenv('DB_PORT', '5432')
        db_name = quote(os.getenv('DB_NAME', 'shms'), safe='')
        print(f"postgresql://{user}:{password}@{host}:{port}/{db_name}")
        PY
        )
        airflow db init
        airflow users create --username admin --password "${AIRFLOW_ADMIN_PASSWORD:-changeme_on_first_login}" --firstname SHMS --lastname Admin --role Admin --email admin@shms.local || true
    volumes:
      - ./etl/dags:/opt/airflow/dags
      - ./etl/scripts:/opt/airflow/scripts
      - ./etl:/opt/airflow/etl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  airflow:
    image: apache/airflow:2.9.3
    container_name: shms_airflow
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'False'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
      AIRFLOW_UID: 50000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shms}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ETL_RAW_DIR: /opt/airflow/etl/data/raw
      ETL_PROCESSED_DIR: /opt/airflow/etl/data/processed
      ETL_STATE_FILE: /opt/airflow/etl/state/etl_state.json
      ETL_SCHEMA_FILE: /opt/airflow/etl/schema.sql
    entrypoint: /bin/bash
    command:
      - -c
      - |
        export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=$$(python3 - <<'PY'
        import os
        from urllib.parse import quote
        user = quote(os.getenv('DB_USER', 'postgres'), safe='')
        password = quote(os.getenv('DB_PASSWORD', ''), safe='')
        host = os.getenv('DB_HOST', 'db')
        port = os.getenv('DB_PORT', '5432')
        db_name = quote(os.getenv('DB_NAME', 'shms'), safe='')
        print(f"postgresql://{user}:{password}@{host}:{port}/{db_name}")
        PY
        )
        exec airflow webserver
    ports:
      - "8080:8080"
    volumes:
      - ./etl/dags:/opt/airflow/dags
      - ./etl/scripts:/opt/airflow/scripts
      - ./etl:/opt/airflow/etl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_started

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: shms_airflow_scheduler
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
      AIRFLOW_UID: 50000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shms}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ETL_RAW_DIR: /opt/airflow/etl/data/raw
      ETL_PROCESSED_DIR: /opt/airflow/etl/data/processed
      ETL_STATE_FILE: /opt/airflow/etl/state/etl_state.json
      ETL_SCHEMA_FILE: /opt/airflow/etl/schema.sql
    entrypoint: /bin/bash
    command:
      - -c
      - |
        export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=$$(python3 - <<'PY'
        import os
        from urllib.parse import quote
        user = quote(os.getenv('DB_USER', 'postgres'), safe='')
        password = quote(os.getenv('DB_PASSWORD', ''), safe='')
        host = os.getenv('DB_HOST', 'db')
        port = os.getenv('DB_PORT', '5432')
        db_name = quote(os.getenv('DB_NAME', 'shms'), safe='')
        print(f"postgresql://{user}:{password}@{host}:{port}/{db_name}")
        PY
        )
        exec airflow scheduler
    volumes:
      - ./etl/dags:/opt/airflow/dags
      - ./etl/scripts:/opt/airflow/scripts
      - ./etl:/opt/airflow/etl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: ../devops/docker/frontend/Dockerfile
    container_name: shms_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
