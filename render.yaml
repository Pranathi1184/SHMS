databases:
  - name: shms-db
    plan: starter
    databaseName: shms
    user: shms_user

services:
  - type: web
    name: shms-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shms-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: shms-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  - type: cron
    name: shms-etl-cron
    env: python
    plan: starter
    rootDir: etl
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/extract.py && python scripts/transform.py && python scripts/load.py
    schedule: "0 * * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shms-db
          property: connectionString
