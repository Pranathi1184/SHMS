name: SHMS CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Select optional deployment target for manual runs
        required: false
        type: choice
        default: none
        options:
          - none
          - development
          - production
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: shms_test
      TEST_DB_NAME: shms_test
      NODE_ENV: test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRE: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      CI: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
          
      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Security Audit (Backend)
        run: cd backend && npm audit --audit-level=high || true

      - name: Security Audit (Frontend)
        run: cd frontend && npm audit --audit-level=high || true

      - name: Prepare Backend Test Data
        run: |
          cd backend
          node scripts/ensure-db.js
          node run-seed.js
        
      - name: Run Backend Tests
        run: cd backend && npx jest --runInBand
        
      - name: Install Frontend Dependencies
        run: cd frontend && npm ci
        
      - name: Run Frontend Tests
        run: cd frontend && npm test -- --watchAll=false

      - name: Run Frontend Build
        run: cd frontend && npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')) ||
      github.event_name == 'workflow_dispatch'
    outputs:
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            ENV_TAG="prod"
          else
            ENV_TAG="dev"
          fi
          echo "backend_tag=${{ secrets.DOCKERHUB_USERNAME }}/shms-backend:${ENV_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "frontend_tag=${{ secrets.DOCKERHUB_USERNAME }}/shms-frontend:${ENV_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./devops/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shms-backend:latest
          
      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./devops/docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shms-frontend:latest

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'development')
    environment: development
    concurrency:
      group: shms-deploy-dev
      cancel-in-progress: false
    steps:
      - name: Validate required secrets
        id: validate_secrets
        env:
          EC2_HOST_DEV: ${{ secrets.EC2_HOST_DEV }}
          EC2_USER_DEV: ${{ secrets.EC2_USER_DEV }}
          EC2_SSH_KEY_DEV: ${{ secrets.EC2_SSH_KEY_DEV }}
        run: |
          if [ -n "$EC2_HOST_DEV" ] && [ -n "$EC2_USER_DEV" ] && [ -n "$EC2_SSH_KEY_DEV" ]; then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
            echo "All development deployment secrets are configured."
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Development deployment secrets are missing. Skipping deployment."
          fi

      - name: Skip development deployment (secrets missing)
        if: steps.validate_secrets.outputs.deploy_enabled != 'true'
        run: echo "Development deployment skipped because EC2 deployment secrets are not configured."

      - name: Deploy to EC2 (Development)
        if: steps.validate_secrets.outputs.deploy_enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ${{ secrets.EC2_USER_DEV }}
          key: ${{ secrets.EC2_SSH_KEY_DEV }}
          script: |
            set -e
            if ! command -v git >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y git curl
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y git curl
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y git curl
              fi
            fi

            if ! command -v docker >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y docker.io
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y docker
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y docker
              else
                echo "Unsupported Linux distribution: unable to install Docker automatically"
                exit 1
              fi
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-v2 || true
              if sudo docker compose version >/dev/null 2>&1; then
                COMPOSE_CMD="docker compose"
              elif command -v docker-compose >/dev/null 2>&1; then
                COMPOSE_CMD="docker-compose"
              else
                COMPOSE_VER="v2.29.7"
                sudo mkdir -p /usr/local/lib/docker/cli-plugins
                sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
                sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                COMPOSE_CMD="docker compose"
              fi
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_VER="v2.29.7"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              COMPOSE_CMD="docker compose"
            fi

            APP_DIR="$HOME/shms"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all
            git checkout develop
            git pull origin develop
            if [ "$COMPOSE_CMD" = "docker-compose" ]; then
              sudo docker-compose up -d --build
            else
              sudo docker compose up -d --build
            fi

      - name: Health Check (Development)
        if: steps.validate_secrets.outputs.deploy_enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ${{ secrets.EC2_USER_DEV }}
          key: ${{ secrets.EC2_SSH_KEY_DEV }}
          script: |
            set -e
            curl -f http://localhost:5000/health
            curl -f http://localhost/

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    environment: production
    concurrency:
      group: shms-deploy-prod
      cancel-in-progress: false
    steps:
      - name: Validate required secrets
        id: validate_secrets
        env:
          EC2_HOST_PROD: ${{ secrets.EC2_HOST_PROD }}
          EC2_USER_PROD: ${{ secrets.EC2_USER_PROD }}
          EC2_SSH_KEY_PROD: ${{ secrets.EC2_SSH_KEY_PROD }}
        run: |
          if [ -n "$EC2_HOST_PROD" ] && [ -n "$EC2_USER_PROD" ] && [ -n "$EC2_SSH_KEY_PROD" ]; then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
            echo "All production deployment secrets are configured."
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Production deployment secrets are missing. Skipping deployment."
          fi

      - name: Skip production deployment (secrets missing)
        if: steps.validate_secrets.outputs.deploy_enabled != 'true'
        run: echo "Production deployment skipped because EC2 deployment secrets are not configured."

      - name: Deploy to EC2 (Production)
        if: steps.validate_secrets.outputs.deploy_enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            set -e
            if ! command -v git >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y git curl
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y git curl
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y git curl
              fi
            fi

            if ! command -v docker >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y docker.io
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y docker
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y docker
              else
                echo "Unsupported Linux distribution: unable to install Docker automatically"
                exit 1
              fi
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-v2 || true
              if sudo docker compose version >/dev/null 2>&1; then
                COMPOSE_CMD="docker compose"
              elif command -v docker-compose >/dev/null 2>&1; then
                COMPOSE_CMD="docker-compose"
              else
                COMPOSE_VER="v2.29.7"
                sudo mkdir -p /usr/local/lib/docker/cli-plugins
                sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
                sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                COMPOSE_CMD="docker compose"
              fi
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_VER="v2.29.7"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              COMPOSE_CMD="docker compose"
            fi

            APP_DIR="$HOME/shms"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all
            git checkout main
            git pull origin main
            if [ "$COMPOSE_CMD" = "docker-compose" ]; then
              sudo docker-compose up -d --build
            else
              sudo docker compose up -d --build
            fi
            
      - name: Health Check (Production)
        if: steps.validate_secrets.outputs.deploy_enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            set -e
            curl -f http://localhost:5000/health
            curl -f http://localhost/
