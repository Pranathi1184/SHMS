AWSTemplateFormatVersion: '2010-09-09'
Description: SHMS PostgreSQL on RDS (free-tier ready) with CloudWatch alarms

Parameters:
  VpcId:
    Type: String
  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  BackendSecurityGroupId:
    Type: String
    Default: ''
    Description: Optional backend EC2 security group ID
  DBName:
    Type: String
    Default: shms
  DBInstanceIdentifier:
    Type: String
    Default: shms-db
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t4g.micro
  AllocatedStorage:
    Type: Number
    Default: 20
  DBUser:
    Type: String
    Default: shms_admin
  DBPassword:
    Type: String
    NoEcho: true
  PubliclyAccessible:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
  AlarmSNSTopicArn:
    Type: String
    Default: ''

Conditions:
  HasAlarmTopic: !Not [!Equals [!Ref AlarmSNSTopicArn, '']]
  HasBackendSecurityGroup: !Not [!Equals [!Ref BackendSecurityGroupId, '']]

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for SHMS RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !If [HasBackendSecurityGroup, !Ref BackendSecurityGroupId, !Ref AWS::NoValue]
          CidrIp: !If [HasBackendSecurityGroup, !Ref AWS::NoValue, !Ref VpcCidr]
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      DBInstanceIdentifier: !Ref DBInstanceIdentifier
      AllocatedStorage: !Ref AllocatedStorage
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: '15'
      MasterUsername: !Ref DBUser
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      StorageType: gp2
      StorageEncrypted: true
      MultiAZ: false
      PubliclyAccessible: !Ref PubliclyAccessible
      BackupRetentionPeriod: 7
      DeletionProtection: false
      AutoMinorVersionUpgrade: true
      EnablePerformanceInsights: false
      Tags:
        - Key: Name
          Value: SHMS-Database

  RdsCpuHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: RDS CPU utilization is high
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSInstance
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmSNSTopicArn]
        - []

  RdsFreeStorageLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: RDS free storage below 2GB
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2147483648
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSInstance
      AlarmActions: !If
        - HasAlarmTopic
        - [!Ref AlarmSNSTopicArn]
        - []

Outputs:
  DBInstanceIdentifier:
    Value: !Ref RDSInstance
  DBSecurityGroupId:
    Value: !Ref DBSecurityGroup
  DBEndpoint:
    Value: !GetAtt RDSInstance.Endpoint.Address
  DBPort:
    Value: !GetAtt RDSInstance.Endpoint.Port
